name: Apply database review final fixes

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-db-review-fixes.yml'

permissions:
  contents: write

jobs:
  apply-review-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply reviewed source changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected snippet not found in {path}: {old[:120]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'server/notionAdapter.js',
              "function notionSessionProjectName(value = '') { const canonical = canonicalProjectName(value || 'LifeMap'); if (canonical === 'LifeMap') return 'Life OS'; if (canonical === 'LM Inbox') return 'AI Inbox'; return canonical; }",
              "function notionSessionProjectName(value = '') { return canonicalProjectName(value || 'LifeMap') || 'LifeMap'; }",
          )

          replace_once(
              'server/notionAdapter.js',
              "id: page.id, title: firstTitle(props, ['Session', 'Name', 'Название', 'Сессия']) || 'Work session', taskIds, task:",
              "id: page.id, title: firstTitle(props, ['Session', 'Name', 'Название', 'Сессия']) || 'Work session', taskIds, scope: firstSelect(props, ['Scope']) || '', task:",
          )

          replace_once(
              'server/notionAdapter.js',
              "    unlinkedSessions: sessions.filter((session) => !(session.taskIds || []).length).length,",
              "    unlinkedSessions: sessions.filter((session) => !(session.taskIds || []).length && !['project', 'historical'].includes(normalizeKey(session.scope))).length,\n    standaloneSessions: sessions.filter((session) => !(session.taskIds || []).length && ['project', 'historical'].includes(normalizeKey(session.scope))).length,",
          )

          replace_once(
              'server/notionAdapter.js',
              "Session: titleProperty(payload.title || payload.session || 'LifeMap session'), Task: relationProperty(taskIds), Project: selectProperty(notionSessionProjectName(payload.project || 'LifeMap'))",
              "Session: titleProperty(payload.title || payload.session || 'LifeMap session'), Task: relationProperty(taskIds), Scope: selectProperty(payload.scope || (taskIds.length ? 'Task' : 'Project')), Project: selectProperty(notionSessionProjectName(payload.project || 'LifeMap'))",
          )

          replace_once(
              'server/aiPrivacy.js',
              "    unlinkedSessions: Number(quality.unlinkedSessions || 0),\n    tasksWithoutNextAction:",
              "    unlinkedSessions: Number(quality.unlinkedSessions || 0),\n    standaloneSessions: Number(quality.standaloneSessions || 0),\n    tasksWithoutNextAction:",
          )

          replace_once(
              'server/aiPrivacy.js',
              "    project: safeLabel(session.project, 160),\n    status:",
              "    project: safeLabel(session.project, 160),\n    scope: safeText(session.scope, 40),\n    status:",
          )

          replace_once(
              'src/lib/actionMapModel.js',
              "details: [session.project && `Проект: ${session.project}`",
              "details: [session.scope && `Охват: ${session.scope}`, session.project && `Проект: ${session.project}`",
          )

          replace_once(
              'scripts/test-data-model.mjs',
              "      unlinkedSessions: 0,\n      tasksWithoutNextAction:",
              "      unlinkedSessions: 0,\n      standaloneSessions: 0,\n      tasksWithoutNextAction:",
          )

          replace_once(
              'scripts/test-data-model.mjs',
              "{ id: 'session-1', title: 'Data review', task: 'Review LifeMap data', taskCode: 'LM-101', taskIds: ['task-1'], project: 'LifeMap', status:",
              "{ id: 'session-1', title: 'Data review', task: 'Review LifeMap data', taskCode: 'LM-101', taskIds: ['task-1'], project: 'LifeMap', scope: 'Task', status:",
          )

          replace_once(
              'scripts/test-data-model.mjs',
              "assert.equal(assistant.sessions[0].result, 'Mapped missing fields');",
              "assert.equal(assistant.sessions[0].result, 'Mapped missing fields');\nassert.equal(assistant.sessions[0].scope, 'Task');\nassert.equal(assistant.dataQuality.standaloneSessions, 0);",
          )

          review = Path('docs/CODE_REVIEW_2026-07-10.md')
          text = review.read_text(encoding='utf-8')
          marker = '## Review closure — 2026-07-10'
          if marker not in text:
              text += '''\n\n## Review closure — 2026-07-10\n\nThe remaining database review decision was resolved: historical work sessions may remain intentionally standalone. LifeMap Sessions now has an explicit `Scope` field (`Task`, `Project`, `Historical`). Data quality no longer reports an intentional Historical or Project-scoped session as a broken Task relation, while genuinely unclassified unlinked sessions remain visible as quality issues.\n\nNew sessions created through the API write an explicit scope automatically: `Task` when a Task relation is present, otherwise `Project`. Session scope is included in the map details and bounded LM Assistant context.\n\nCanonical write-back now stores `LifeMap` and `LM Inbox` directly instead of translating new session records back to legacy `Life OS` / `AI Inbox` select values. Runtime read compatibility for historical aliases is retained.\n\nThe private-read product decision documented earlier has also been resolved: protected LifeMap reads use the existing access key and issue an HttpOnly session cookie after successful unlock; writes continue to require the explicit secret header. Public health output is sanitized and contains no private Notion error details.\n'''
              review.write_text(text, encoding='utf-8')
          PY
      - name: Verify tests and production build
        run: npm test && npm run build
      - name: Commit finalized review fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server/notionAdapter.js server/aiPrivacy.js src/lib/actionMapModel.js scripts/test-data-model.mjs docs/CODE_REVIEW_2026-07-10.md
          git diff --cached --quiet || git commit -m "Finalize LifeMap database review [skip ci]"
          git push

# Triggered after the workflow was present on the default branch.
