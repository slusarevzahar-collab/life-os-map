name: AI policy regression checks

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'scripts/test-ai-policy.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ai-policy-tests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-ai-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run and record AI regression checks
        shell: bash
        run: |
          set +e
          npm run test:ai > /tmp/ai-policy-test.log 2>&1
          code=$?
          set -e

          mkdir -p docs
          TEST_EXIT_CODE="$code" python - <<'PY'
          import json, os
          from datetime import datetime, timezone

          code = int(os.environ.get('TEST_EXIT_CODE', '1'))
          with open('/tmp/ai-policy-test.log', 'r', encoding='utf-8', errors='replace') as f:
              lines = f.read().splitlines()
          status = {
              'ok': code == 0,
              'policyVersion': '2026-07-09.4',
              'commit': os.environ.get('GITHUB_SHA', ''),
              'checkedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'exitCode': code,
              'logTail': lines[-30:],
          }
          with open('docs/AI_POLICY_TEST_STATUS.json', 'w', encoding='utf-8') as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/AI_POLICY_TEST_STATUS.json
          git commit -m "Record AI policy regression result [skip ci]" || true
          git push

          cat /tmp/ai-policy-test.log
          exit "$code"
