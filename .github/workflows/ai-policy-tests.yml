name: AI policy regression checks

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'scripts/test-ai-policy.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ai-policy-tests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-ai-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ai
      - name: Record successful regression check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          cat > docs/AI_POLICY_TEST_STATUS.json <<EOF
          {
            "ok": true,
            "policyVersion": "2026-07-09.4",
            "commit": "${GITHUB_SHA}",
            "checkedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/AI_POLICY_TEST_STATUS.json
          git commit -m "Record AI policy regression success [skip ci]" || true
          git push
