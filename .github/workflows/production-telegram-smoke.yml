name: Production LifeMap smoke

on:
  push:
    branches: [main]
    paths-ignore:
      - docs/LM_INBOX_PRODUCTION_STATUS.json
      - docs/LM_INBOX_DATA_STATUS.json
      - docs/LIFEMAP_DATA_HEALTH.json
      - docs/AI_POLICY_TEST_STATUS.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lifemap-production-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run full LifeMap regressions and save result
        shell: bash
        run: |
          set +e
          npm test > /tmp/lifemap-test.log 2>&1
          code=$?
          set -e
          mkdir -p docs
          TEST_EXIT_CODE="$code" python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          code = int(os.environ.get('TEST_EXIT_CODE', '1'))
          with open('/tmp/lifemap-test.log', 'r', encoding='utf-8', errors='replace') as f:
              lines = f.read().splitlines()
          status = {
              'ok': code == 0,
              'policyVersion': '2026-07-09.4',
              'suite': 'AI policy + data model',
              'commit': os.environ.get('GITHUB_SHA', ''),
              'checkedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'exitCode': code,
              'logTail': lines[-40:],
          }
          with open('docs/AI_POLICY_TEST_STATUS.json', 'w', encoding='utf-8') as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY

      - name: Wait for production deployment and verify LifeMap health
        shell: bash
        run: |
          set -euo pipefail
          telegram_endpoint="https://lifemap-gamma.vercel.app/api/telegram/status"
          inbox_endpoint="https://lifemap-gamma.vercel.app/api/life-os/inbox/assets"
          data_endpoint="https://lifemap-gamma.vercel.app/api/life-os/data-health"
          body=""
          for attempt in {1..24}; do
            body="$(curl --fail --silent --show-error --max-time 20 "$telegram_endpoint" || true)"
            data_body="$(curl --fail --silent --show-error --max-time 30 "$data_endpoint" || true)"
            if BODY="$body" DATA_BODY="$data_body" python - <<'PY'
          import json, os, sys
          try:
              telegram = json.loads(os.environ.get('BODY', ''))
              data = json.loads(os.environ.get('DATA_BODY', ''))
          except Exception:
              sys.exit(1)
          telegram_ok = (
              telegram.get('ok') is True
              and telegram.get('configured') is True
              and telegram.get('hasSecret') is True
              and telegram.get('allowedUsersLocked') is True
              and telegram.get('signalsDb') is True
              and telegram.get('intake', {}).get('secureReady') is True
              and telegram.get('intake', {}).get('durableFirst') is True
              and telegram.get('intake', {}).get('backgroundScheduler') == 'vercel-waitUntil'
          )
          connected = data.get('connected', {})
          core_ok = data.get('ok') is True and all(connected.get(key) is True for key in ['tasks', 'goals', 'sessions', 'projectAreas', 'dreams', 'signals'])
          version_ok = str(data.get('version', '')).startswith('0.9')
          sys.exit(0 if telegram_ok and core_ok and version_ok else 1)
          PY
            then
              mkdir -p docs
              BODY="$body" python - <<'PY'
          import json, os
          data = json.loads(os.environ['BODY'])
          with open('docs/LM_INBOX_PRODUCTION_STATUS.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          PY

              DATA_BODY="$data_body" python - <<'PY'
          import json, os
          data = json.loads(os.environ['DATA_BODY'])
          with open('docs/LIFEMAP_DATA_HEALTH.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
              f.write('\n')
          print(json.dumps(data, ensure_ascii=False, indent=2))
          PY

              inbox_body="$(curl --fail --silent --show-error --max-time 30 "$inbox_endpoint")"
              INBOX_BODY="$inbox_body" python - <<'PY'
          import json, os
          payload = json.loads(os.environ['INBOX_BODY'])
          signals = payload.get('signals') if isinstance(payload, dict) else []
          signals = signals if isinstance(signals, list) else []
          status = {
              'ok': True,
              'visibleRecords': len(signals),
              'analyzedRecords': sum(1 for s in signals if s.get('aiProcessingVersion')),
              'trulyMissingAnalysis': sum(1 for s in signals if s.get('needsReprocessing') is True),
              'stalePolicyRecords': sum(1 for s in signals if s.get('staleProcessingVersion') is True),
              'bundledRecords': sum(1 for s in signals if int(s.get('bundleCount') or 1) > 1),
              'bundledChildRowsHiddenFromUi': sum(max(0, int(s.get('bundleCount') or 1) - 1) for s in signals),
          }
          with open('docs/LM_INBOX_DATA_STATUS.json', 'w', encoding='utf-8') as f:
              json.dump(status, f, ensure_ascii=False, indent=2)
              f.write('\n')
          print(json.dumps(status, ensure_ascii=False, indent=2))
          PY

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add docs/LM_INBOX_PRODUCTION_STATUS.json docs/LM_INBOX_DATA_STATUS.json docs/LIFEMAP_DATA_HEALTH.json docs/AI_POLICY_TEST_STATUS.json
              git commit -m "Record production LifeMap health [skip ci]" || true
              git push

              python - <<'PY'
          import json, sys
          with open('docs/AI_POLICY_TEST_STATUS.json', 'r', encoding='utf-8') as f:
              status = json.load(f)
          sys.exit(0 if status.get('ok') is True else 1)
          PY
              exit 0
            fi
            echo "Attempt $attempt: production LifeMap not ready yet"
            echo "Telegram: $body"
            echo "Data: $data_body"
            sleep 15
          done
          echo "Production LifeMap did not become ready in time"
          echo "$body"
          echo "$data_body"
          exit 1
