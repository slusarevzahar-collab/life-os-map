name: Import original LifeMap background

on:
  push:
    branches:
      - fix/layout-windows-motion-background
    paths:
      - .github/workflows/import-original-space-background.yml

permissions:
  contents: write

jobs:
  import-background:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/layout-windows-motion-background
          fetch-depth: 0

      - name: Download original 2048×1152 image
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/assets
          curl --fail --location --retry 5 --retry-delay 2 \
            --user-agent 'Mozilla/5.0' \
            --referer 'https://getwallpapers.com/collection/stars-hd-wallpapers' \
            'https://getwallpapers.com/wallpaper/full/3/d/8/1293136-new-stars-hd-wallpapers-2048x1152-large-resolution.jpg' \
            --output public/assets/space-bg-original.jpg
          test "$(stat -c%s public/assets/space-bg-original.jpg)" -gt 250000
          file public/assets/space-bg-original.jpg | grep -qiE 'JPEG|image data'

      - name: Commit binary asset
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/assets/space-bg-original.jpg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'Add original high-resolution LifeMap background'
          git push origin HEAD:fix/layout-windows-motion-background
