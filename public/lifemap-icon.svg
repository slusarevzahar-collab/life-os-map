<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LifeMap</title>
  <desc id="desc">Abstract orbital map with a central navigation node and connected life spheres.</desc>
  <defs>
    <radialGradient id="bg" cx="34%" cy="24%" r="82%">
      <stop offset="0" stop-color="#17364d"/>
      <stop offset="0.42" stop-color="#081522"/>
      <stop offset="1" stop-color="#02070d"/>
    </radialGradient>
    <radialGradient id="core" cx="36%" cy="25%" r="75%">
      <stop offset="0" stop-color="#dffcff"/>
      <stop offset="0.18" stop-color="#7df9ff"/>
      <stop offset="0.58" stop-color="#18bdd2"/>
      <stop offset="1" stop-color="#0a5165"/>
    </radialGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#67e8f9" stroke-opacity="0.12" stroke-width="2"/>
  <circle cx="256" cy="256" r="124" fill="none" stroke="#67e8f9" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="7 12"/>

  <path d="M256 256 C217 204 176 183 131 182 M256 256 C317 226 358 179 382 129 M256 256 C297 301 326 346 334 393 M256 256 C207 301 169 330 120 344"
        fill="none" stroke="url(#route)" stroke-width="10" stroke-linecap="round" stroke-opacity="0.72"/>

  <g fill="#67e8f9" filter="url(#glow)">
    <circle cx="131" cy="182" r="18"/>
    <circle cx="382" cy="129" r="18"/>
    <circle cx="334" cy="393" r="18"/>
    <circle cx="120" cy="344" r="18"/>
  </g>

  <circle cx="256" cy="256" r="78" fill="#67e8f9" opacity="0.12" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="64" fill="url(#core)"/>
  <circle cx="236" cy="232" r="13" fill="#ffffff" opacity="0.74"/>

  <path d="M220 268 L249 297 L305 216" fill="none" stroke="#f6feff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
